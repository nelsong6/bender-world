<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Can body -->
  <rect x="28" y="16" width="44" height="68" rx="6" ry="6" fill="#e8e8e8" stroke="#bbb" stroke-width="1.5"/>
  <!-- Top rim -->
  <ellipse cx="50" cy="18" rx="20" ry="4" fill="#d0d0d0" stroke="#bbb" stroke-width="1"/>
  <!-- Pull tab -->
  <ellipse cx="50" cy="16" rx="6" ry="2.5" fill="#ccc" stroke="#aaa" stroke-width="0.8"/>
  <!-- Label area -->
  <rect x="30" y="30" width="40" height="40" rx="2" ry="2" fill="white" stroke="#ddd" stroke-width="0.5"/>
  <!-- Blue ribbon/banner -->
  <path d="M30,42 Q50,36 70,42 L70,52 Q50,46 30,52 Z" fill="#3a6fb0"/>
  <!-- Red accent stripes -->
  <rect x="30" y="54" width="40" height="3" fill="#c0392b"/>
  <rect x="30" y="36" width="40" height="3" fill="#c0392b"/>
  <!-- Star on blue banner -->
  <polygon points="50,40 51.5,43 55,43.5 52.5,45.8 53,49.3 50,47.5 47,49.3 47.5,45.8 45,43.5 48.5,43" fill="white"/>
  <!-- Bottom rim -->
  <ellipse cx="50" cy="82" rx="20" ry="3" fill="#ccc" stroke="#bbb" stroke-width="1"/>
  <!-- Subtle can shine -->
  <rect x="34" y="20" width="4" height="58" rx="2" ry="2" fill="rgba(255,255,255,0.25)"/>
</svg>
