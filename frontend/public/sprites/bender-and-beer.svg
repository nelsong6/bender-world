<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="headGrad2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8eaab8"/>
      <stop offset="30%" stop-color="#a8c0cc"/>
      <stop offset="70%" stop-color="#9cb4c0"/>
      <stop offset="100%" stop-color="#7a9aaa"/>
    </linearGradient>
    <linearGradient id="canShine2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(255,255,255,0.05)"/>
      <stop offset="25%" stop-color="rgba(255,255,255,0.3)"/>
      <stop offset="40%" stop-color="rgba(255,255,255,0.05)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.08)"/>
    </linearGradient>
    <linearGradient id="canBody2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d8d8d8"/>
      <stop offset="30%" stop-color="#f0f0f0"/>
      <stop offset="70%" stop-color="#e8e8e8"/>
      <stop offset="100%" stop-color="#c8c8c8"/>
    </linearGradient>
    <linearGradient id="blueRibbon2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e4d8c"/>
      <stop offset="50%" stop-color="#1a3f73"/>
      <stop offset="100%" stop-color="#15325c"/>
    </linearGradient>
  </defs>

  <!-- ========== BENDER (left side, scaled 0.6) ========== -->
  <g transform="translate(-6, 8) scale(0.6)">
    <!-- Antenna -->
    <line x1="50" y1="2" x2="50" y2="18" stroke="#556" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="50" cy="2" r="2.8" fill="#7a8a90"/>

    <!-- Head -->
    <path d="
      M 20,28
      Q 20,18 32,18
      L 68,18
      Q 80,18 80,28
      L 80,68
      Q 80,78 68,78
      L 32,78
      Q 20,78 20,68
      Z
    " fill="url(#headGrad2)" stroke="#6a8a96" stroke-width="1.8"/>

    <path d="M 30,20 Q 50,17 70,20 L 70,26 Q 50,23 30,26 Z" fill="rgba(255,255,255,0.1)"/>

    <!-- Visor -->
    <rect x="24" y="32" width="52" height="20" rx="10" ry="10" fill="#b0b8bc" stroke="#7a8a90" stroke-width="1.5"/>

    <!-- Left eye -->
    <circle cx="38" cy="42" r="9" fill="white" stroke="#3a3a3a" stroke-width="2.2"/>
    <circle cx="39.5" cy="41" r="3.5" fill="#111"/>

    <!-- Right eye -->
    <circle cx="62" cy="42" r="9" fill="white" stroke="#3a3a3a" stroke-width="2.2"/>
    <circle cx="63.5" cy="41" r="3.5" fill="#111"/>

    <!-- Mouth -->
    <rect x="26" y="58" width="48" height="16" rx="2" ry="2" fill="#c8cfd4" stroke="#6a8a96" stroke-width="1.5"/>
    <line x1="32" y1="58" x2="32" y2="74" stroke="#8a9aa0" stroke-width="1.2"/>
    <line x1="38" y1="58" x2="38" y2="74" stroke="#8a9aa0" stroke-width="1.2"/>
    <line x1="44" y1="58" x2="44" y2="74" stroke="#8a9aa0" stroke-width="1.2"/>
    <line x1="50" y1="58" x2="50" y2="74" stroke="#8a9aa0" stroke-width="1.2"/>
    <line x1="56" y1="58" x2="56" y2="74" stroke="#8a9aa0" stroke-width="1.2"/>
    <line x1="62" y1="58" x2="62" y2="74" stroke="#8a9aa0" stroke-width="1.2"/>
    <line x1="68" y1="58" x2="68" y2="74" stroke="#8a9aa0" stroke-width="1.2"/>
    <line x1="26" y1="66" x2="74" y2="66" stroke="#8a9aa0" stroke-width="0.8"/>

    <!-- Overbite -->
    <path d="M28,74 Q50,80 72,74" fill="none" stroke="#6a8a96" stroke-width="1.5"/>

    <!-- Neck -->
    <rect x="38" y="78" width="24" height="6" fill="#7a9aaa" stroke="#6a8a96" stroke-width="1"/>

    <!-- Body/shoulders -->
    <path d="M30,84 Q50,82 70,84 L74,92 Q50,88 26,92 Z" fill="#8eaab8" stroke="#6a8a96" stroke-width="1.2"/>

    <!-- Right arm reaching toward beer -->
    <rect x="70" y="86" width="38" height="5" rx="2.5" ry="2.5" fill="#8eaab8" stroke="#6a8a96" stroke-width="1"/>
    <!-- Hand -->
    <rect x="104" y="84" width="6" height="9" rx="2" ry="2" fill="#8eaab8" stroke="#6a8a96" stroke-width="0.8"/>
  </g>

  <!-- ========== BEER CAN (right side, scaled 0.52) ========== -->
  <g transform="translate(58, 14) scale(0.52)">
    <!-- Can body -->
    <rect x="22" y="6" width="56" height="84" rx="3.5" ry="3.5" fill="url(#canBody2)" stroke="#aaa" stroke-width="0.8"/>

    <!-- Can top -->
    <ellipse cx="50" cy="8" rx="27" ry="4.5" fill="#c8c8c8" stroke="#aaa" stroke-width="0.7"/>
    <ellipse cx="50" cy="8" rx="23" ry="3.5" fill="#d4d4d4"/>
    <ellipse cx="50" cy="7" rx="7" ry="2.2" fill="none" stroke="#999" stroke-width="1"/>

    <!-- White label -->
    <rect x="24" y="16" width="52" height="64" fill="white"/>

    <!-- Top red stripe -->
    <rect x="24" y="16" width="52" height="4" fill="#c0392b"/>
    <rect x="24" y="20" width="52" height="1.2" fill="#d4a017"/>

    <!-- Blue/red lines -->
    <rect x="24" y="23" width="52" height="1.5" fill="#1a3f73"/>
    <rect x="24" y="25" width="52" height="0.8" fill="#c0392b"/>

    <!-- Blue ribbon -->
    <rect x="24" y="28" width="52" height="28" fill="url(#blueRibbon2)"/>
    <path d="M24,28 Q37,25.5 50,28 Q63,30.5 76,28" fill="url(#blueRibbon2)"/>
    <path d="M24,56 Q37,58.5 50,56 Q63,53.5 76,56" fill="url(#blueRibbon2)"/>

    <!-- Text -->
    <text x="50" y="38" text-anchor="middle" fill="white" font-family="serif" font-size="6" font-weight="bold" letter-spacing="1.8">PABST</text>
    <text x="50" y="45" text-anchor="middle" fill="white" font-family="serif" font-size="4.5" font-weight="bold" letter-spacing="1.2">BLUE RIBBON</text>

    <!-- Star -->
    <polygon points="50,48 51.6,51.5 55.5,52 52.8,54.5 53.3,58.5 50,56.5 46.7,58.5 47.2,54.5 44.5,52 48.4,51.5" fill="white" opacity="0.9"/>

    <!-- Side accents -->
    <path d="M25.5,44 Q30,41 30,45 Q30,49 25.5,46 Z" fill="#c0392b" opacity="0.75"/>
    <path d="M74.5,44 Q70,41 70,45 Q70,49 74.5,46 Z" fill="#c0392b" opacity="0.75"/>

    <!-- Bottom stripes -->
    <rect x="24" y="59" width="52" height="0.8" fill="#c0392b"/>
    <rect x="24" y="61" width="52" height="1" fill="#d4a017"/>
    <rect x="24" y="64" width="52" height="1.5" fill="#c0392b"/>
    <rect x="24" y="67" width="52" height="1.5" fill="#1a3f73"/>
    <rect x="24" y="70" width="52" height="4" fill="#c0392b"/>
    <rect x="24" y="74" width="52" height="6" fill="white"/>

    <!-- Can bottom -->
    <ellipse cx="50" cy="88" rx="27" ry="3.5" fill="#bbb" stroke="#aaa" stroke-width="0.7"/>

    <!-- Shine -->
    <rect x="22" y="6" width="56" height="84" rx="3.5" ry="3.5" fill="url(#canShine2)"/>
    <line x1="27" y1="12" x2="27" y2="86" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
  </g>
</svg>
