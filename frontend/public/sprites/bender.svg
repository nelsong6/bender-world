<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Antenna -->
  <line x1="50" y1="8" x2="50" y2="22" stroke="#666" stroke-width="3" stroke-linecap="round"/>
  <circle cx="50" cy="6" r="3" fill="#888"/>
  <!-- Head (rounded rectangle) -->
  <rect x="22" y="22" width="56" height="52" rx="14" ry="14" fill="#8fa4b0"/>
  <rect x="22" y="22" width="56" height="52" rx="14" ry="14" fill="none" stroke="#6e8794" stroke-width="2"/>
  <!-- Visor band -->
  <rect x="28" y="36" width="44" height="16" rx="8" ry="8" fill="#d4d4d4" stroke="#999" stroke-width="1.5"/>
  <!-- Eyes -->
  <circle cx="40" cy="44" r="6" fill="white" stroke="#555" stroke-width="1.5"/>
  <circle cx="60" cy="44" r="6" fill="white" stroke="#555" stroke-width="1.5"/>
  <circle cx="41" cy="44" r="2.5" fill="#222"/>
  <circle cx="61" cy="44" r="2.5" fill="#222"/>
  <!-- Mouth area -->
  <rect x="32" y="58" width="36" height="12" rx="3" ry="3" fill="#c0c8cc" stroke="#7a8e98" stroke-width="1"/>
  <!-- Teeth lines -->
  <line x1="38" y1="58" x2="38" y2="70" stroke="#7a8e98" stroke-width="1"/>
  <line x1="44" y1="58" x2="44" y2="70" stroke="#7a8e98" stroke-width="1"/>
  <line x1="50" y1="58" x2="50" y2="70" stroke="#7a8e98" stroke-width="1"/>
  <line x1="56" y1="58" x2="56" y2="70" stroke="#7a8e98" stroke-width="1"/>
  <line x1="62" y1="58" x2="62" y2="70" stroke="#7a8e98" stroke-width="1"/>
  <!-- Neck/chin -->
  <rect x="38" y="74" width="24" height="8" rx="2" ry="2" fill="#7a8e98"/>
  <!-- Body hint -->
  <rect x="30" y="82" width="40" height="14" rx="4" ry="4" fill="#8fa4b0" stroke="#6e8794" stroke-width="1.5"/>
</svg>
